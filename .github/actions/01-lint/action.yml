name: 'Lint'
description: 'Run Ruff and Pyright linting checks'

runs:
  using: 'composite'
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.14
      shell: bash

    - name: Install dependencies
      run: uv sync --locked --all-extras
      shell: bash

    - name: Ruff check
      run: uv run ruff check .
      shell: bash

    - name: Ruff format check
      run: uv run ruff format --check .
      shell: bash

    - name: Pyright type check
      run: uv run pyright
      shell: bash