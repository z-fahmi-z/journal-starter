name: 'Docker Build'
description: 'Build and load a Docker image locally for downstream push actions'

inputs:
  image-name:
    description: 'Local image name (e.g., api)'
    required: true

  image-tag:
    description: 'Image tag'
    required: false
    default: ${{ github.sha }}

  dockerfile-path:
    description: 'Path to Dockerfile'
    required: false
    default: './Dockerfile'

  context:
    description: 'Build context path'
    required: false
    default: '.'

  build-args:
    description: 'Build arguments (newline-delimited KEY=VALUE)'
    required: false
    default: ''

outputs:
  image-ref:
    description: 'Full local image reference (name:tag) for downstream push actions'
    value: ${{ inputs.image-name }}:${{ inputs.image-tag }}

runs:
  using: 'composite'
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build image
      uses: docker/build-push-action@v5
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile-path }}
        push: false
        load: true
        tags: ${{ inputs.image-name }}:${{ inputs.image-tag }}
        build-args: ${{ inputs.build-args }}
        cache-from: type=gha,scope=${{ github.ref_name }}
        cache-to: type=gha,scope=${{ github.ref_name }},mode=max