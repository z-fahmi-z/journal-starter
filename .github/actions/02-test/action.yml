name: 'Test'
description: 'Run Python tests with PostgreSQL database'

runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.14
      shell: bash

    - name: Install dependencies
      run: uv sync --locked --all-extras
      shell: bash

    - name: Initialize database schema
      run: |
        PGPASSWORD=postgres psql \
          -h localhost -U postgres -d career_journal \
          -f ./db/database_setup.sql
      shell: bash

    - name: Run tests
      run: uv run pytest -v
      shell: bash