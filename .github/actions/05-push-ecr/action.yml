name: 'ECR Push'
description: 'Tag and push a Docker image to Amazon ECR'

inputs:
  image-ref:
    description: 'Local image reference to push (e.g. api:sha123)'
    required: true

  role-to-assume:
    description: 'IAM role ARN for OIDC authentication'
    required: true

  aws-region:
    description: 'AWS region'
    required: false
    default: 'us-east-1'

  ecr-repository:
    description: 'ECR repository name'
    required: true

  image-tag:
    description: 'Image tag'
    required: false
    default: ${{ github.sha }}

  push-latest:
    description: 'Also tag and push as latest'
    required: false
    default: 'true'

outputs:
  image-uri:
    description: 'Full pushed image URI (registry/repository:tag)'
    value: ${{ steps.push.outputs.image-uri }}

runs:
  using: 'composite'
  steps:
    - name: Validate local image exists
      shell: bash
      run: |
        if ! docker image inspect "${{ inputs.image-ref }}" >/dev/null 2>&1; then
          echo "Error: Local image '${{ inputs.image-ref }}' not found"
          exit 1
        fi

    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.role-to-assume }}
        aws-region: ${{ inputs.aws-region }}

    - name: Login to Amazon ECR
      id: ecr-login
      uses: aws-actions/amazon-ecr-login@v2

    - name: Ensure ECR repository exists
      shell: bash
      env:
        ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
      run: |
        REPO="${{ inputs.ecr-repository }}"
        if ! aws ecr describe-repositories --repository-names "$REPO" --region "${{ inputs.aws-region }}" >/dev/null 2>&1; then
          echo "Creating ECR repository: $REPO"
          aws ecr create-repository --repository-name "$REPO" --region "${{ inputs.aws-region }}"
        fi

    - name: Tag and push image
      id: push
      shell: bash
      env:
        ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
      run: |
        set -euo pipefail

        TARGET="${ECR_REGISTRY}/${{ inputs.ecr-repository }}:${{ inputs.image-tag }}"

        docker tag "${{ inputs.image-ref }}" "$TARGET"
        docker push "$TARGET"

        if [ "${{ inputs.push-latest }}" = "true" ]; then
          LATEST="${ECR_REGISTRY}/${{ inputs.ecr-repository }}:latest"
          docker tag "${{ inputs.image-ref }}" "$LATEST"
          docker push "$LATEST"
        fi

        echo "image-uri=$TARGET" >> "$GITHUB_OUTPUT"