#
# THIS COMPOSE FILE IS DEDICATED FOR DEVCONTAINER USAGE ONLY. DO NOT EDIT OR USE THIS FOR PRODUCTION DEPLOYMENT.
# USE docker-compose.local.yml FOR LOCAL DEPLOYMENT.
#
services:
  devcontainer:
    image: mcr.microsoft.com/devcontainers/python:3-3.14-bookworm
    volumes:
      - ..:/workspaces:cached
    command: sleep infinity
    env_file: ["../.env"]
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    env_file: ["../.env"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../db/database_setup.sql:/docker-entrypoint-initdb.d/database_setup.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data: